<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Capsule</title>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --border: #334155;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 400px;
      margin: 0;
      padding: 16px;
      background-color: var(--bg);
      color: var(--text);
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 16px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--text);
      background: var(--surface);
    }
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }
    button.action-btn {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    button.action-btn:hover {
      background-color: var(--primary-hover);
    }
    textarea {
      width: 100%;
      height: 200px;
      background-color: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 0.85rem;
      resize: vertical;
      margin-bottom: 12px;
    }
    .capsule-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .capsule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .capsule-actions {
      display: flex;
      gap: 8px;
    }
    .btn-small {
      background: var(--border);
      color: var(--text);
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .btn-small.delete {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }
    .btn-small:hover { filter: brightness(1.2); }
  </style>
</head>
<body>

  <h1>💊 Context Capsule</h1>

  <div class="tabs">
    <button class="tab-btn active" data-target="capture-panel">Capture</button>
    <button class="tab-btn" data-target="saved-panel">Saved Capsules</button>
  </div>

  <!-- Capture Panel -->
  <div id="capture-panel" class="panel active">
    <button id="extract-btn" class="action-btn">Extract Chat from Current Tab</button>
    <div id="editor-container" style="display: none;">
      <label style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; display: block;">
        Edit/Summarize Markdown Context:
      </label>
      <textarea id="markdown-editor"></textarea>
      <button id="save-capsule-btn" class="action-btn" style="background-color: #10b981;">Save & Format Capsule</button>
    </div>
  </div>

  <!-- Saved Panel -->
  <div id="saved-panel" class="panel">
    <div id="capsules-list">
      <!-- Capsules injected here via JS -->
    </div>
    <div id="empty-state" style="text-align: center; color: var(--text-muted); padding: 20px; display: none;">
      No capsules saved yet.
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
